<span lang="zh">
  <div class="expression">{{Expression}}</div>

  {{#Hint}}
  <div class="hint-container">
    <div class="hint-content">{{Hint}}</div>
  </div>
  {{/Hint}}

  <div style="display: none;">{{Glossary}}</div>
</span>

<script>
  (() => {
    function getSimpTradFromCCCEDICT() {
      const headword = document.querySelector('[data-sc-cccedict]');
      if (headword) {
        const match = headword.textContent.match(/【(.+)・(.+)】/);
        if (match) return match[2].trim();
      }
      return null;
    }
    const simplified = getSimpTradFromCCCEDICT();
    if (simplified) {
      document.querySelector('.expression').innerHTML =
        `<span class="simplified">${simplified}</span>`;
    }
  })();
</script>
